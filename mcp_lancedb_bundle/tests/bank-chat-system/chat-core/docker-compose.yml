# Postgres + Zookeeper + Kafka for local R&D.
# Start: docker compose up -d
# JDBC: jdbc:postgresql://localhost:5432/banking_chat (user/pass banking_chat)
# Kafka: localhost:9092
#
# chat-core (8080): mvn -pl chat-app spring-boot:run
# chat-assign (8081): cd ../chat-assign && mvn spring-boot:run — set chat.chat-assign.base-url to http://localhost:8081

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: banking_chat
      POSTGRES_PASSWORD: banking_chat
      POSTGRES_DB: banking_chat
    ports:
      - "5432:5432"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
