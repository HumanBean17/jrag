name: test

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            docs:
              - '**/*.md'
              - '**/*.mdc'
              - 'docs/**'
              - 'propose/**'
              - 'plans/**'
              - 'skills/**'
              - '.agents/**'
              - 'AGENTS.md'
              - 'README.md'
              - 'CODEBASE_REQUIREMENTS.md'
              - '.github/CODEOWNERS'
            code:
              - '**/*.py'
              - 'pyproject.toml'
              - 'pytest.ini'
              - 'mcp.json.example'
              - '.gitignore'
              - '.github/workflows/**'
              - 'tests/fixtures/**'
              - 'tests/bank-chat-system/**'
              - 'tests/pytest.ini'
      - uses: actions/setup-python@v5
        if: steps.changes.outputs.code == 'true'
        with:
          python-version: "3.11"
      - name: Install dependencies
        if: steps.changes.outputs.code == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Check generated edge navigation doc
        if: steps.changes.outputs.code == 'true'
        run: python scripts/generate_edge_navigation.py --check
      - name: Run tests
        if: steps.changes.outputs.code == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: pytest tests -v
      - name: Skip tests (docs-only)
        if: steps.changes.outputs.code != 'true'
        run: echo "Docs-only change; pytest skipped."
