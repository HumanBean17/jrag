spring:
  application:
    name: banking-chat-rnd
  datasource:
    url: jdbc:postgresql://localhost:5432/banking_chat
    username: banking_chat
    password: banking_chat
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: chat-ingestion
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

chat:
  consumer-group-id: chat-ingestion
  rate-limit-per-minute: 60
  reopen-window-hours: 72
  sla-watchdog-ms: 15000
  sla-first-response-seconds:
    VIP: 60
    PRIVATE: 120
    RETAIL: 300
  business-hours:
    zone-id: "UTC"
    weekday-start: "00:00"
    weekday-end: "23:59"
  chat-assign:
    # chat-assign service (e.g. http://localhost:8081)
    base-url: ""
  join-operator:
    # When set, chat-assign must send the same value in X-Chat-Internal-Token
    internal-token: ""

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  pattern:
    level: "%5p [%X{correlationId:-}]"
